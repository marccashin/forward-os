<style>
    :root {
      --navy: #1a2744;
      --navy-light: #243660;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --bg: #f5f6fa;
      --card: #ffffff;
      --border: #dde3ef;
      --text: #1a2744;
      --muted: #6b7a99;
      --green: #16a34a;
      --red: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* â”€â”€ HEADER â”€â”€ */
    .header {
      background: var(--navy);
      color: white;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
  
  
  
  
  
  
  
  
  

    .logo { font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); }
    .header-title { font-size: 17px; font-weight: 600; color: white; }
    .header-sub { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 1px; }
    .btn-gold { background: var(--gold); color: var(--navy); border: none; border-radius: 6px; padding: 9px 18px; font-size: 13px; font-weight: 700; cursor: pointer; letter-spacing: .3px; transition: background .15s; }
    .btn-gold:hover { background: var(--gold-light); }
    .btn-navy { background: var(--navy); color: white; border: none; border-radius: 6px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background .15s; }
    .btn-navy:hover { background: var(--navy-light); }
    .btn-outline { background: white; color: var(--navy); border: 1.5px solid var(--border); border-radius: 6px; padding: 7px 15px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
