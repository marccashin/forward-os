<style>
    :root {
      --navy: #1a2744;
      --navy-light: #243660;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --bg: #f5f6fa;
      --card: #ffffff;
      --border: #dde3ef;
      --text: #1a2744;
      --muted: #6b7a99;
      --green: #16a34a;
      --red: #dc2626;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      color: white;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
